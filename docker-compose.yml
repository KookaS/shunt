services:
  shunt:
    build: .
    image: ghcr.io/kookas/shunt-router:latest
    ports:
      - "8080:8080"
    environment:
      - SHUNT_HOST=0.0.0.0
      - SHUNT_PORT=8080
      - SHUNT_DB_PATH=/data/shunt.db
    volumes:
      - shunt_data:/data
    restart: unless-stopped

volumes:
  shunt_data:
