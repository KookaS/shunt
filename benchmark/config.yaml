# Shunt Benchmark Configuration
# Human-editable. Changes here propagate to all scripts.
# All model metadata (tier, pricing, provider) lives in the model registry
# (src/shunt/models/default_config.yaml).
# This file only controls which models are active and how routing behaves.

models:
  deepseek-v4-flash:
    enabled: true
  zai-glm-5.2:
    enabled: true
  kimi-k2.5:
    enabled: true
  qwen3.7-plus:
    enabled: true
  gpt-5-mini:
    enabled: true
  kimi-k3:
    enabled: true
  claude-opus-4-6:
    enabled: false

strategies:
  enabled:
    - oracle              # upper bound (perfect knowledge, best quality)
    - always_frontier     # baseline: always the most expensive model
    - always_cheap        # baseline: always the cheapest model
    - knn                 # shipped algorithm: predict by nearest neighbors
    - knn_cascade         # best quality: kNN-informed try-verify-escalate
    - external_prior      # SWE-bench leaderboard per-tier difficulty prior
    # - oracle_reward      # same as oracle with different cost weight
    # - random             # not useful for comparison
  knn:
    k: 20
    success_rate_threshold: 0.6   # lower = more cost savings, higher = more reliability
    min_samples: 3
  knn_cascade:
    max_tries: 3
    success_rate_threshold: 0.6
  external_prior:
    threshold: 0.5   # escalate when external cheap-tier resolve rate < this
  # knn_blended is NOT in `enabled` above: it embeds ~490 external statements, too
  # heavy for the always-run simulated caching loop. Enable it explicitly for the
  # strategy comparison (scripts/plot_external.py) — params below apply when it is.
  knn_blended:
    k: 20
    success_rate_threshold: 0.5
    min_samples: 1
    external_weight: 0.25   # down-weight of external neighbours vs our verified runs

routing:
  default_strategy: cascade
  control_model: kimi-k3    # cheapest-frontier baseline for the kill gate (opus excluded)
  gamma: 0.1

# p(arm|model) exploration sampling. A model's default_arm always
# runs; each other bracket arm of rank `r` (0 = cheapest) runs on the fraction of
# challenges below weights[r] (deterministic, cost-skewed toward cheaper arms).
# Ranks beyond the list reuse the last weight. Keeps exploration within ~1.3-1.6x
# of today's cost instead of running the full bracket on every cell.
# `enabled` gates the sweep itself (default false): the live executor sends one
# fixed request per (challenge, model) regardless of arm, so sweeping arms now
# would bill duplicate identical requests cached under fake arm labels. Flip to
# true only once per-arm requests are wired into the live executor.
arm_sampling:
  enabled: false
  weights: [0.5, 0.35, 0.25]

paths:
  challenges: routing/data/challenges.json        # curated input, relative to config.py dir
  results_csv: routing/results.csv                # generated source of truth (read-write)
  challenge_store: challenges                     # relative to benchmark/

benchmark:
  seed: 42
  bootstrap_iterations: 10000
  n_default: 20
  sample_size: 20             # 0 = all tasks, N = first N tasks in the nested order (cost-safe partial run)
