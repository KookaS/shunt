# CI handshake spec. This file's PRESENCE makes the tool CI-eligible — the matrix
# in .github/workflows/integration-handshake.yml globs examples/integrations/*/handshake.yaml
# and runs one matrix leg per file. `service` names the compose service whose exit
# code is the verdict; `expected_tier` must name a tier present in
# tests/integrations/fake_registry.yaml (checked by tests/test_integrations_sync.py).
# BEST-EFFORT: the CI matrix runs this leg continue-on-error — it self-seeds a flow
# (see compose.yaml) but drives a heavy pinned Flowise server, so keep it non-blocking.
tool: flowise
wire: openai
service: client
expected_tier: cheap
best_effort: true    # continue-on-error in CI (real CLI/service onboarding is brittle)
