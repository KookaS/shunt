# flowise → Shunt handshake. Seeds a Conversation Chain flow whose ChatOpenAI node
# points at Shunt (basepath = http://shunt:8080/v1), then calls the prediction API
# and asserts the routed answer ("ok") comes back — a genuine end-to-end proof.
#
# Pinned to flowiseai/flowise:2.2.8 (the last v2): v3 forces interactive account
# registration on first boot, hostile to hermetic CI. With no FLOWISE_USERNAME/
# PASSWORD set, the management API is reachable with the `x-request-from: internal`
# header, and `/api/v1/prediction/` is whitelisted (no auth). The flow graph is not
# hand-authored (its anchor ids are version-specific and brittle) — the client
# fetches Flowise's own shipped "Conversation Chain" marketplace template at runtime
# and patches three fields, so it always matches the pinned image's schema.
# Best-effort: the CI matrix runs this leg continue-on-error.
include:
  - ../compose.base.yaml

configs:
  flowise_seed:
    content: |
      """Seed a ConversationChain flow pointed at Shunt, then predict."""
      import json, sys, urllib.request as u, urllib.error

      BASE = "http://flowise:3000"
      INT = {"Content-Type": "application/json", "x-request-from": "internal"}

      def call(path, body=None, headers=INT, method="POST"):
          data = json.dumps(body).encode() if body is not None else None
          req = u.Request(BASE + path, data=data, headers=headers, method=method)
          try:
              with u.urlopen(req, timeout=90) as r:
                  return r.status, json.loads(r.read().decode())
          except urllib.error.HTTPError as e:
              return e.code, {"err": e.read().decode()[:200]}

      # 1. Fetch the shipped Conversation Chain template (matches this image's schema).
      _, tpls = call("/api/v1/marketplaces/templates", None, INT, "GET")
      graph = json.loads(next(t for t in tpls if t.get("templateName") == "Conversation Chain")["flowData"])
      # 2. ChatOpenAI requires a credential; the key is never used (Shunt ignores it).
      _, cred = call("/api/v1/credentials", {"name": "shunt", "credentialName": "openAIApi",
                     "plainDataObj": {"openAIApiKey": "sk-dummy"}})
      # 3. Point the model node at Shunt.
      for n in graph["nodes"]:
          if n["data"].get("name") == "chatOpenAI":
              n["data"]["inputs"]["basepath"] = "http://shunt:8080/v1"
              n["data"]["inputs"]["modelName"] = "auto"
              n["data"]["credential"] = cred["id"]
      # 4. Create the chatflow, then predict.
      _, cf = call("/api/v1/chatflows", {"name": "shunt-handshake", "type": "CHATFLOW",
                   "deployed": True, "flowData": json.dumps(graph)})
      status, pred = call("/api/v1/prediction/" + cf["id"], {"question": "hi"},
                          {"Content-Type": "application/json"})
      print("flowise prediction:", status, json.dumps(pred)[:200])
      if status != 200 or "ok" not in json.dumps(pred).lower():
          sys.exit("flowise handshake FAILED")
      print("OK: flowise handshake passed")

services:
  flowise:
    image: flowiseai/flowise:2.2.8
    depends_on:
      shunt:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD-SHELL
        - "wget -q -O /dev/null http://localhost:3000/api/v1/ping || exit 1"
      interval: 3s
      timeout: 3s
      retries: 40

  client:
    image: python:3.12-slim
    depends_on:
      flowise:
        condition: service_healthy
    configs:
      - source: flowise_seed
        target: /seed.py
    entrypoint:
      - python3
      - /seed.py
