# litellm-proxy → Shunt handshake. Proves a full chain: client → LiteLLM gateway
# → Shunt → provider. The `client` leg's exit code IS the verdict: it fails unless
# the LiteLLM gateway relays Shunt's routed completion back through the OpenAI wire.
#
# The gateway config is delivered via a Compose `config` (inline content, read
# CLI-side) rather than a single-file bind mount — single-file binds are
# unreliable across hosts/daemons. Needs Docker Compose >= 2.23.
include:
  - ../compose.base.yaml

configs:
  litellm_config:
    content: |
      model_list:
        - model_name: auto
          litellm_params:
            model: openai/auto
            api_base: http://shunt:8080/v1
            api_key: ignored

services:
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    depends_on:
      shunt:
        condition: service_healthy
    configs:
      - source: litellm_config
        target: /app/config.yaml
    command:
      - --config
      - /app/config.yaml
      - --port
      - "4000"
    expose:
      - "4000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')
      interval: 2s
      timeout: 3s
      retries: 30

  client:
    image: curlimages/curl:8.11.1
    depends_on:
      litellm:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        curl -sf http://litellm:4000/v1/chat/completions \
          -H "Authorization: Bearer ignored" \
          -H "Content-Type: application/json" \
          -d '{"model":"auto","messages":[{"role":"user","content":"hi"}]}' \
          | tee /tmp/resp.txt
        grep -q '"content":"ok"' /tmp/resp.txt
        echo "OK: litellm-proxy handshake passed"
