# n8n → Shunt handshake (BEST-EFFORT). Runs a workflow headless via `n8n execute`.
# The CI matrix runs this leg `continue-on-error`: wiring the LangChain OpenAI Chat
# Model credential headlessly is brittle, so a red exit here is not a Shunt failure.
# The real, supported path is the README below. The workflow is delivered as a
# Compose `config` (inline content), not a single-file bind mount. Needs Compose >= 2.23.
include:
  - ../compose.base.yaml

configs:
  n8n_workflow:
    content: |
      {
        "name": "shunt-handshake",
        "nodes": [
          {
            "parameters": {},
            "id": "11111111-1111-1111-1111-111111111111",
            "name": "Manual Trigger",
            "type": "n8n-nodes-base.manualTrigger",
            "typeVersion": 1,
            "position": [260, 300]
          },
          {
            "parameters": {
              "model": "auto",
              "messages": { "values": [ { "role": "user", "content": "hi" } ] },
              "options": {}
            },
            "id": "22222222-2222-2222-2222-222222222222",
            "name": "OpenAI Chat Model",
            "type": "@n8n/n8n-nodes-langchain.lmChatOpenAi",
            "typeVersion": 1,
            "position": [520, 300],
            "credentials": { "openAiApi": { "id": "1", "name": "Shunt" } }
          }
        ],
        "connections": {
          "Manual Trigger": {
            "main": [ [ { "node": "OpenAI Chat Model", "type": "main", "index": 0 } ] ]
          }
        }
      }

services:
  n8n:
    image: n8nio/n8n
    depends_on:
      shunt:
        condition: service_healthy
    environment:
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
    configs:
      - source: n8n_workflow
        target: /data/workflow.json
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -eu
        n8n execute --file /data/workflow.json
        echo "OK: n8n handshake passed"
