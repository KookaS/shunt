# openai-python → Shunt handshake. The leg's exit code IS the verdict: it fails
# unless Shunt returns the routed completion AND the X-Shunt-Decision header rides
# back on the raw response.
include:
  - ../compose.base.yaml

services:
  openai-python:
    image: python:3.12-slim
    depends_on:
      shunt:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
    command:
      - |
        set -eu
        pip install --quiet --disable-pip-version-check "openai>=1.55"
        python - <<'PY'
        from openai import OpenAI
        c = OpenAI(base_url="http://shunt:8080/v1", api_key="ignored")
        r = c.chat.completions.with_raw_response.create(
            model="auto", messages=[{"role": "user", "content": "hi"}])
        assert any(k.lower() == "x-shunt-decision" for k in r.headers), dict(r.headers)
        assert r.parse().choices[0].message.content == "ok"
        print("OK: openai-python handshake passed")
        PY
