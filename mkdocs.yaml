site_name: Shunt
site_description: Tool-agnostic, cache-safe LLM router
site_url: https://shunt-router.readthedocs.io
repo_url: https://github.com/KookaS/shunt
repo_name: KookaS/shunt

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Architecture: architecture.md
  - Benchmark:
    - Overview: benchmark.md
    - Design: benchmark-design.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
