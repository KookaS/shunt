version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"

mkdocs:
  # The ONE config, shared with the Pages deploy workflow (.github/workflows/docs.yml).
  # There used to be a second mkdocs.yaml here for this target; the two silently
  # diverged on site_url, site_description and nav, and only the Pages site was ever
  # rebuilt — so the RTD site drifted with nothing to reveal it.
  configuration: mkdocs.yml

python:
  install:
    - requirements: docs/requirements.txt
